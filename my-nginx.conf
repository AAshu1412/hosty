server {
    listen 80;
    
    # This captures the subdomain (e.g., 'ashu') and saves it as a variable
    server_name ~^(?<subdomain>.+)\.hosty\.com$;

    # This dynamically points NGINX to that user's specific folder
    root /usr/share/nginx/html/$subdomain;
    index index.html index.htm;

    # This ensures React/Vite router links work correctly!
    location / {
        try_files $uri $uri/ /index.html;
    }
}
