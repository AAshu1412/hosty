version: "3.8"

services:

  postgres:
    image: postgres:18.3
    container_name: hosty-postgres
    ports:
      - "5432:5432"
    env_file:
      - ./server/.env 
    environment:
      - NODE_ENV=production
      - POSTGRES_DB=hosty
    networks:
      - hosty-net
    volumes:
      - hosty-volume:/var/lib/postgresql
    restart: unless-stopped


  hosty-backend:
    build:
      context: ./server
    container_name: hosty-backend
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env 
    environment:
      - NODE_ENV=production
    networks:
      - hosty-net
    depends_on:
      - postgres
    restart: unless-stopped


  hosty-front:
    build:
      context: ./frontend
      args:
        - VITE_SERVER_URL=http://ec2-13-233-104-221.ap-south-1.compute.amazonaws.com:5001
        - VITE_GITHUB_CLIENT_ID=Iv23liC3cv3llyxCk1Xe
    container_name: hosty-frontend
    ports:
      - "8080:80"
    networks:
      - hosty-net
    depends_on:
      - hosty-backend
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: hosty-jenkins
    user: root 
    ports:
      - "8090:8080"
      - "50000:50000"
    networks:
      - hosty-net
    volumes:
      - jenkins-data:/var/jenkins_home
      - hosty-web-deployments:/srv/http
    restart: unless-stopped


  nginx:
    image: nginx:alpine
    container_name: hosty-nginx
    ports:
      - "80:80" 
    networks:
      - hosty-net
    
        # This mounts a local folder into Apache so you can easily serve HTML files
    volumes:
      - hosty-web-deployments:/usr/share/nginx/html
      - ../my-nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped

volumes:
  hosty-volume:
  jenkins-data:
  hosty-web-deployments:

networks:
  hosty-net:
