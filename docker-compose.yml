version: "3.8"

services:
  hosty-front:
    build:
      context: ./frontend
      args:
        - VITE_SERVER_URL=http://localhost:5001
        - VITE_GITHUB_CLIENT_ID=Iv23liC3cv3llyxCk1Xe
    container_name: hosty-frontend
    ports:
      - "8080:80"
    networks:
      - hosty-net
    depends_on:
      - hosty-backend
    restart: unless-stopped

  hosty-backend:
    build:
      context: ./server
    container_name: hosty-backend
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env 
    environment:
      - NODE_ENV=production
    networks:
      - hosty-net
    restart: unless-stopped

networks:
  hosty-net: