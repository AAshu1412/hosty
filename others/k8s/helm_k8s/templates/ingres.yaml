# templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hosty-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  # This catches the main platform traffic
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: hosty-backend-svc
            port:
              number: 5001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hosty-frontend-svc
            port:
              number: 80