apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosty-frontend
  namespace: {{ .Values.namespace }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hosty-frontend
  template:
    metadata:
      labels:
        app: hosty-frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.images.frontend }}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hosty-frontend-svc
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: hosty-frontend
  ports:
    - port: 80