kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: flow-auto-backend-hpa
  namespace: flow-auto-ns

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flow-auto-backend-deployment

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70